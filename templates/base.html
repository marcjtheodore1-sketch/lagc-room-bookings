<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LAGC - Room Bookings for Fridays @ The Smithson{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/">📅 LAGC - Fridays @ The Smithson</a>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link">Book a Room</a>
            <a href="/admin" class="nav-link">Admin</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>London Autism Group Charity - Room Bookings for Fridays @ The Smithson</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
