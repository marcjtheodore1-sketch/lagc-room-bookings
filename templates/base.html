<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LAGC - Fridays @ Farringdon{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/">
                <span>LAGC - Fridays @ Farringdon</span>
            </a>
            <a href="https://www.londonautismgroupcharity.org" target="_blank" class="charity-logo-link">
                <img src="{{ url_for('static', filename='images/lagc_logo.jpg') }}" alt="London Autism Group Charity" class="nav-logo">
            </a>
        </div>
        <div class="nav-links">
            <a href="https://donorbox.org/london-autism-group-charity-donations" target="_blank" class="nav-link nav-donate">❤️ Donate</a>
            <a href="https://www.londonautismgroupcharity.org/#newsletter" target="_blank" class="nav-link">Sign Up</a>
            <a href="https://tinyurl.com/lagcnews310326" target="_blank" class="nav-link">Newsletter</a>
            <a href="/book" class="nav-link">Book a Room</a>
            <a href="/admin" class="nav-link">Admin</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p><a href="https://www.londonautismgroupcharity.org" target="_blank" class="footer-charity-link">London Autism Group Charity</a> - Fridays @ Farringdon</p>
        <div class="footer-links">
            <a href="https://donorbox.org/london-autism-group-charity-donations" target="_blank" class="footer-link">❤️ Donate</a>
            <a href="https://www.londonautismgroupcharity.org/#newsletter" target="_blank" class="footer-link">Sign Up</a>
            <a href="https://tinyurl.com/lagcnews310326" target="_blank" class="footer-link">Newsletter</a>
            <a href="/book" class="footer-link">Book a Room</a>
            <a href="/admin" class="footer-link">Admin</a>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
