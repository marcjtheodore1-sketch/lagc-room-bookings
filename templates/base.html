<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LAGC - Fridays @ Farringdon{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/">
                <img src="{{ url_for('static', filename='images/lagc_logo.jpg') }}" alt="LAGC" class="nav-logo">
                <span>LAGC - Fridays @ Farringdon</span>
            </a>
        </div>
        <div class="nav-links">
            <a href="/book" class="nav-link">Book a Room</a>
            <a href="/admin" class="nav-link">Admin</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>London Autism Group Charity - Fridays @ Farringdon</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
